name: Notificação de Push no Discord
on:
  push:
    branches:
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:

      - name: Checkout do Repositório
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Criar mensagem para o Discord
        run: |
          echo "**📢 Novo push detectado!**" > commits.txt
          echo "👤 Autor: ${{ github.actor }}" >> commits.txt
          echo "🕒 Data/Hora: $(date '+%d/%m/%Y %H:%M:%S')" >> commits.txt
          echo "" >> commits.txt
          echo "📝 Commits enviados:" >> commits.txt

          count=$(jq 'length' <<< '${{ toJson(github.event.commits) }}')
          jq -c '.[]' <<< '${{ toJson(github.event.commits) }}' | while read -r commit; do
            sha=$(jq -r '.id' <<< "$commit")
            msg=$(jq -r '.message' <<< "$commit")
            short=$(echo $sha | cut -c1-7)
            echo "➡️ \`$short\` — $msg" >> commits.txt
          done

          echo "" >> commits.txt
          echo "🚀 Branch: **${{ github.ref_name }}**" >> commits.txt
          echo "🔗 Repositório: ${{ github.repository }}" >> commits.txt
          echo "" >> commits.txt

          if [ "$count" -eq 1 ]; then
            echo "🎉 [Commit único, suave demais!](https://media.giphy.com/media/26AHONQ79FdWZhAI0/giphy.gif)" >> commits.txt
          elif [ "$count" -eq 2 ]; then
            echo "🤓 [Dois commits, mandou bem!](https://media.giphy.com/media/3o7TKtnuHOHHUjR38Y/giphy.gif)" >> commits.txt
          else
            echo "😱 [Muitos commits de uma vez, socorro!](https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif)" >> commits.txt
          fi

      - name: Enviar notificação para o Discord
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: '{{-F file=@commits.txt}}'


